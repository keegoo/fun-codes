<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字灰烬崩塌效果</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px;
  background-color: #f6f6f6;
}
input {
  font-size: 32px;
  padding: 10px;
  width: 60%;
  text-align: center;
  border: 2px solid #ccc;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #0078d4 }
canvas { border: 1px solid #ddd; margin-top: 30px; background-color: white }
button {
  margin: 10px 10px 0 10px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 8px;
  border: none;
  background-color: #0078d4;
  color: white;
  transition: background-color 0.2s;
}
button:hover { background-color: #005fa3 }
.button-container { margin-top: 20px }
.counter {
  margin-top: 12px;
  font-size: 16px;
  color: #555;
  font-family: monospace;
}
</style>
</head>
<body>

<h2>文字灰烬崩塌特效 ✨</h2>
<input id="textInput" type="text" placeholder="输入文字…" />
<canvas id="c" width="800" height="300"></canvas>

<div class="button-container">
  <button id="ashBtn">💨 灰烬堆积</button>
  <button id="explodeBtn">💥 爆散飞溅</button>
  <button id="resetBtn">🔄 重置文字</button>
</div>
<div class="counter" id="particleCounter">粒子数：0</div>

<script>
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const input = document.getElementById('textInput')
const ashBtn = document.getElementById('ashBtn')
const explodeBtn = document.getElementById('explodeBtn')
const resetBtn = document.getElementById('resetBtn')

let particles = []
const groundY = canvas.height - 10
let columnHeights = []
const particleCounter = document.getElementById('particleCounter')

function updateCounter() {
  const total = particles.length
  const settled = particles.filter(p => p.settled).length
  particleCounter.textContent = `粒子数：${total}（已堆积 ${settled}）`
}

function resetColumns() {
  columnHeights = new Array(canvas.width).fill(0)
}

// Smooth column heights locally around a settled particle
// to create a natural, less jagged ash pile
function smoothColumnsAround(col, radius) {
  const smoothed = [...columnHeights]
  for (let i = Math.max(0, col - radius); i <= Math.min(canvas.width - 1, col + radius); i++) {
    let sum = 0
    let weightSum = 0
    for (let j = Math.max(0, i - radius); j <= Math.min(canvas.width - 1, i + radius); j++) {
      const dist = Math.abs(i - j)
      const weight = Math.max(0, 1 - dist / (radius + 1))
      sum += columnHeights[j] * weight
      weightSum += weight
    }
    smoothed[i] = Math.max(columnHeights[i], sum / weightSum)
  }
  columnHeights = smoothed
}

function drawParticleWithGlow(x, y, size, r, g, b, glowIntensity) {
  ctx.shadowBlur = glowIntensity
  ctx.shadowColor = `rgb(${r},${g},${b})`
  ctx.fillStyle = `rgb(${r},${g},${b})`
  ctx.fillRect(x, y, size, size)
  ctx.shadowBlur = 0
}

function drawText(text) {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  ctx.font = 'bold 80px Arial'
  ctx.fillStyle = '#000'
  ctx.textBaseline = 'middle'
  const textWidth = ctx.measureText(text).width
  const x = (canvas.width - textWidth) / 2
  const y = canvas.height / 2 + 10
  ctx.fillText(text, x, y)
}

function createParticles() {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height)
  const data = imgData.data
  particles = []
  for (let y = 0; y < canvas.height; y += 2) {
    for (let x = 0; x < canvas.width; x += 2) {
      const idx = (y * canvas.width + x) * 4
      if (data[idx + 3] > 0) {
        particles.push({
          x,
          y,
          vy: 0,
          vx: (Math.random() - 0.5) * 1.5,
          settled: false,
          size: Math.floor(Math.random() * 3) + 1,
          age: 0,
          emberR: Math.floor(180 + Math.random() * 75),
          emberG: Math.floor(60 + Math.random() * 60),
          emberB: Math.floor(20 + Math.random() * 30)
        })
      }
    }
  }
  updateCounter()
}

// --- 灰烬下落堆积（增强版） ---
function animateAsh() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  for (let p of particles) {
    if (!p.settled) {
      p.vy += 0.5
      let nextX = p.x + p.vx
      let nextY = p.y + p.vy
      const col = Math.floor(nextX)
      const maxY = groundY - (columnHeights[col] || 0)
      if (nextY >= maxY) {
        p.y = maxY
        p.settled = true
        p.age = 0
        columnHeights[col] += p.size
        smoothColumnsAround(col, 4)
        updateCounter()
      } else {
        p.x = nextX
        p.y = nextY
      }
    } else {
      p.age++
    }
    let r, g, b
    let glowIntensity = 0
    if (!p.settled) {
      r = p.emberR
      g = p.emberG
      b = p.emberB
      glowIntensity = 8
    } else {
      const fade = Math.min(p.age / 90, 1)
      r = Math.floor(p.emberR + (220 - p.emberR) * fade)
      g = Math.floor(p.emberG + (220 - p.emberG) * fade)
      b = Math.floor(p.emberB + (220 - p.emberB) * fade)
      glowIntensity = Math.floor(8 * (1 - fade))
    }
    drawParticleWithGlow(p.x, p.y, p.size, r, g, b, glowIntensity)
  }
  if (particles.some(p => !p.settled)) requestAnimationFrame(animateAsh)
}

// --- 爆散飞溅效果（增强版） ---
function animateExplode() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  for (let p of particles) {
    p.vx += (Math.random() - 0.5) * 0.2
    p.vy += 0.4
    p.x += p.vx
    p.y += p.vy
    if (p.y > canvas.height) p.y = canvas.height
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy)
    let r, g, b
    let glowIntensity = 0
    if (speed > 3) {
      r = 255
      g = Math.floor(100 + Math.random() * 80)
      b = Math.floor(20 + Math.random() * 40)
      glowIntensity = 12
    } else if (speed > 1) {
      const fade = (speed - 1) / 2
      r = Math.floor(220 + 35 * fade)
      g = Math.floor(120 + 40 * fade)
      b = Math.floor(60 + 20 * fade)
      glowIntensity = Math.floor(8 * fade)
    } else {
      r = 180
      g = 170
      b = 165
      glowIntensity = 0
    }
    drawParticleWithGlow(p.x, p.y, p.size, r, g, b, glowIntensity)
  }
  if (particles.some(p => p.y < canvas.height)) requestAnimationFrame(animateExplode)
}

// --- 事件绑定 ---
input.addEventListener('input', () => {
  drawText(input.value || 'Hello')
  resetColumns()
})

ashBtn.addEventListener('click', () => {
  resetColumns()
  createParticles()
  animateAsh()
})

explodeBtn.addEventListener('click', () => {
  resetColumns()
  createParticles()
  for (let p of particles) {
    p.vx = (Math.random() - 0.5) * 6
    p.vy = (Math.random() - 1.5) * 6
    p.size = Math.floor(Math.random() * 3) + 1
  }
  animateExplode()
})

resetBtn.addEventListener('click', () => {
  resetColumns()
  particles = []
  updateCounter()
  drawText(input.value || 'Hello')
})

drawText('Hello')
resetColumns()
</script>

</body>
</html>
